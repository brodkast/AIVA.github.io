<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>AIVA — MR Mobile CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap"/>
<style>
/*──────────────────────────────────────
  CDK GLOBAL / RADIAL DESIGN SYSTEM
  MR Mobile Vision Prototype — Apr 2026
──────────────────────────────────────*/
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;font-family:'Roboto',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#BBBDC0;overflow:hidden;color:#000}

:root{
  /* CDK brand */
  --brand:#196FE1;--brand-h:#155EBF;--brand-soft:#DCE9FA;--brand-text:#0D3870;
  /* surfaces */
  --hdr:#1C2434;          /* global header — dark navy */
  --hdr-border:#2E3A4E;
  --bg:#FFFFFF;
  --bg-alt:#F3F3F4;       /* page canvas */
  --card-border:#C4C5C8;  /* Radial card border */
  /* text */
  --ink:#000000;--ink-mid:rgba(0,0,0,.68);--ink-soft:rgba(0,0,0,.45);--ink-faint:rgba(0,0,0,.28);
  --hdr-ink:#FFFFFF;--hdr-ink-mid:rgba(255,255,255,.60);
  /* status */
  --ok:#09AD00;--ok-soft:#E6F9E5;--ok-border:rgba(9,173,0,.30);
  --warn:#FA9C19;--warn-soft:#FFF4E0;--warn-border:rgba(250,156,25,.35);
  --err:#EB0000;--err-soft:#FDECEA;--err-border:rgba(235,0,0,.30);
  --red:#EB0000;
  /* AIVA accent */
  --aiva:#7B61FF;--aiva-d:#5A41E0;--aiva-soft:#EFEAFF;--aiva-ink:#3B2E8A;--aiva-border:#C9B8FF;
  /* nav */
  --nav:#151B25;
  /* radii — CDK Radial */
  --r4:4px;--r8:8px;--r12:8px;--r16:12px;--rpill:999px;
  /* elevation — CDK Radial uses borders, not shadows */
  --s1:none;
  --s2:none;
}

/*── Keyframes ──*/
@keyframes blink     {0%,100%{opacity:1}50%{opacity:.30}}
@keyframes orb-pulse {0%{box-shadow:0 0 0 0 rgba(123,97,255,.5)}70%{box-shadow:0 0 0 10px rgba(123,97,255,0)}100%{box-shadow:0 0 0 0 rgba(123,97,255,0)}}
@keyframes mic-pulse {0%,100%{box-shadow:0 6px 20px rgba(123,97,255,.55),0 0 0 0 rgba(123,97,255,.3)}70%{box-shadow:0 6px 20px rgba(123,97,255,.55),0 0 0 14px rgba(123,97,255,0)}}
@keyframes bar       {0%,100%{transform:scaleY(.28)}50%{transform:scaleY(1)}}
@keyframes fade-up   {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-in  {from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slide-up-sheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes toast-in  {from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes scan-line {0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}
@keyframes confetti  {0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(120px) rotate(720deg);opacity:0}}
@keyframes check-pop {0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes sla-tick  {0%{opacity:1}50%{opacity:.55}100%{opacity:1}}

/*── Shell ──*/
#shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#BBBDC0}
#phone{position:relative;width:100%;max-width:430px;height:100%;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}

/*── Screen wrapper + scroll ──*/
.screen-wrap{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative}
.scroll-body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg-alt)}
.scroll-body::-webkit-scrollbar{display:none}

/*── Material icon ──*/
.mi{font-family:'Material Symbols Rounded';font-style:normal;font-weight:normal;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;user-select:none;-webkit-font-feature-settings:'liga';font-feature-settings:'liga';-webkit-font-smoothing:antialiased;vertical-align:middle}

/*─────────────────────────────────────
  GLOBAL HEADER — dark navy
─────────────────────────────────────*/
.abar{
  flex-shrink:0;
  background:var(--hdr);
  border-bottom:1px solid var(--hdr-border);
}
.abar-inner{display:flex;align-items:center;height:56px;padding:0 4px 0 16px}
/* Logo / wordmark block */
.abar-logo{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.abar-logo-badge{
  width:28px;height:28px;border-radius:50%;
  background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.abar-logo-badge span{font-size:11px;font-weight:800;color:#fff;letter-spacing:-.5px}
.abar-wordmark{
  display:flex;flex-direction:column;
}
.abar-wordmark-top{font-size:11px;font-weight:700;color:var(--hdr-ink);letter-spacing:.8px;text-transform:uppercase;line-height:1}
.abar-wordmark-sub{font-size:10px;color:var(--hdr-ink-mid);margin-top:1px;letter-spacing:.2px}
/* Header icon buttons — white icons */
.icon-btn{width:44px;height:44px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:4px;position:relative;color:var(--hdr-ink)}
.icon-btn:active{background:rgba(255,255,255,.10)}
/* Badge used for notifications */
.bdot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--hdr)}
/* Avatar pill — user initials */
.hdr-avatar{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.30);
  color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;letter-spacing:.3px;
}

/*─────────────────────────────────────
  CHILD APP BAR — white
─────────────────────────────────────*/
.cbar{
  flex-shrink:0;background:#fff;
  border-bottom:1px solid var(--card-border);
  display:flex;align-items:center;height:52px;padding:0 4px;
}
.cbar-text{flex:1;padding:0 8px;min-width:0}
.cbar-title{font-size:18px;font-weight:500;color:var(--ink);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbar-sub{font-size:12px;color:var(--ink-mid);margin-top:1px}
/* Back button inherits icon-btn but in white context */
.cbar .icon-btn{color:var(--ink)}
.cbar .icon-btn:active{background:rgba(0,0,0,.05)}

/*─────────────────────────────────────
  AIVA BANNER
─────────────────────────────────────*/
.aiva-banner{
  flex-shrink:0;width:100%;display:flex;align-items:center;gap:10px;padding:9px 16px;
  background:linear-gradient(90deg,var(--aiva-soft) 0%,#F4F0FF 100%);
  border-bottom:1px solid var(--aiva-border);border-top:none;
  border-left:none;border-right:none;cursor:pointer;text-align:left;
}
.aiva-orb{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#B6A6FF,var(--aiva) 65%,var(--aiva-d));flex-shrink:0}
.aiva-orb.pulse{animation:orb-pulse 1.8s ease-out infinite}
.aiva-label{font-size:13px;font-weight:500;color:var(--aiva-ink)}
.aiva-sub{font-size:11px;color:var(--ink-soft);margin-top:1px}
.wave{display:flex;gap:2px;align-items:flex-end;height:14px;margin-left:auto;flex-shrink:0}
.wave span{width:3px;border-radius:1.5px;background:var(--aiva);animation:bar .9s ease-in-out infinite;display:block}
.wave span:nth-child(1){height:5px}.wave span:nth-child(2){height:9px;animation-delay:.1s}
.wave span:nth-child(3){height:13px;animation-delay:.2s}.wave span:nth-child(4){height:9px;animation-delay:.1s}
.wave span:nth-child(5){height:6px;animation-delay:.05s}

/*─────────────────────────────────────
  BOTTOM NAV
─────────────────────────────────────*/
.bnav{
  flex-shrink:0;height:64px;
  background:var(--nav);
  display:flex;align-items:flex-start;justify-content:space-around;
  padding-top:8px;border-top:1px solid rgba(255,255,255,.08);
}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;color:rgba(255,255,255,.45);position:relative;font-family:inherit}
.ntab.on{color:#fff}
.ntab.on .ntab-icon-wrap::after{content:'';display:block;position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--brand);border-radius:1px}
.ntab-icon-wrap{position:relative}
.ntab .mi{font-size:22px}
.ntab .lbl{font-size:10px;font-weight:500;letter-spacing:.3px}
.ntab .ndot{width:5px;height:5px;border-radius:50%;background:var(--aiva);position:absolute;top:0px;right:-5px;animation:blink 1.4s ease-in-out infinite}

/*─────────────────────────────────────
  CARDS — Radial: border, no shadow
─────────────────────────────────────*/
.card{background:#fff;border-radius:var(--r8);border:1px solid var(--card-border);overflow:hidden}

/*── Section header inside card ──*/
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.sec-hdr-left{display:flex;align-items:baseline;gap:8px}
.sec-hdr h3{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:.05px;text-transform:uppercase;letter-spacing:.5px}
.sec-hdr .cnt{font-size:12px;color:var(--ink-soft)}
.sec-hdr .act{font-size:13px;font-weight:500;color:var(--brand);background:none;border:none;cursor:pointer;font-family:inherit;padding:0}

/*── Divider rows ──*/
.dr{border-bottom:1px solid #EAEAEA}
.dr:last-child{border-bottom:none}

/*── Timeline entries ──*/
.tl-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid #EAEAEA}
.tl-row:last-child{border-bottom:none}
.tl-dot{width:28px;height:28px;border-radius:50%;background:#F0F0F2;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

/*─────────────────────────────────────
  CHIPS — CDK uses r4 rectangle chips
─────────────────────────────────────*/
.chip{display:inline-flex;align-items:center;gap:3px;border-radius:var(--r4);border:1px solid;font-weight:500;letter-spacing:.1px;line-height:1.2;white-space:nowrap;font-size:11px;padding:3px 7px;vertical-align:middle}
.c-n {background:#F2F2F4;color:var(--ink);border-color:#C4C5C8}
.c-b {background:var(--brand-soft);color:var(--brand-text);border-color:#B4CEFA}
.c-ok{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-border)}
.c-w {background:var(--warn-soft);color:var(--warn);border-color:var(--warn-border)}
.c-e {background:var(--err-soft);color:var(--err);border-color:var(--err-border)}
.c-ai{background:var(--aiva-soft);color:var(--aiva-ink);border-color:var(--aiva-border)}
.c-dk{background:#1C2434;color:#fff;border-color:#1C2434}

/*─────────────────────────────────────
  BUTTONS — CDK Radial style
─────────────────────────────────────*/
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r4);font-weight:500;cursor:pointer;font-family:inherit;letter-spacing:.15px;border:1px solid;transition:filter .1s}
.btn:active{filter:brightness(.88)}
.b-p {background:var(--brand);color:#fff;border-color:var(--brand)}
.b-s {background:#fff;color:var(--brand);border-color:var(--brand)}
.b-g {background:transparent;color:var(--brand);border-color:transparent}
.b-ai{background:var(--aiva-d);color:#fff;border-color:var(--aiva-d)}
.b-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.b-e {background:var(--err);color:#fff;border-color:var(--err)}
.b-sm{font-size:12px;padding:7px 12px;min-height:32px}
.b-md{font-size:14px;padding:10px 16px;min-height:42px}
.b-lg{font-size:15px;padding:12px 20px;min-height:50px}
.b-full{width:100%}

/*── CDK Quick-action row (Call · Text · Email) ──*/
.quick-actions-cdk{
  flex-shrink:0;display:flex;align-items:center;
  background:#fff;border-bottom:1px solid var(--card-border);
  padding:0;height:48px;
}
.qact-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  height:100%;background:none;border:none;cursor:pointer;
  font-size:14px;font-weight:500;color:var(--brand);font-family:inherit;
}
.qact-btn:active{background:rgba(25,111,225,.06)}
.qact-sep{width:1px;height:24px;background:var(--card-border);flex-shrink:0}

/*── Form inputs ──*/
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--card-border);border-radius:var(--r4);font-size:14px;font-family:inherit;color:var(--ink);outline:none;background:#fff}
.inp:focus{border-color:var(--brand);border-width:2px}
.lbl{font-size:12px;color:var(--ink-mid);margin-bottom:4px;display:block;font-weight:500}

/*── Toggle switch ──*/
.tog{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;padding:0;transition:background .2s;flex-shrink:0}
.tog-t{position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.22);transition:left .2s}

/*── Segment tabs ──*/
.seg{display:flex;border-bottom:1px solid var(--card-border);background:#fff;flex-shrink:0}
.stab{flex:1;padding:11px 4px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2.5px solid transparent;font-family:inherit;color:var(--ink-mid);transition:color .12s}
.stab.on{color:var(--brand);border-color:var(--brand);font-weight:600}

/*── SLA badge ──*/
.sla-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 7px;border-radius:var(--r4);border:1.5px solid}

/*── Steps of sale pips ──*/
.sos-pip{height:4px;flex:1;border-radius:2px;cursor:pointer;transition:background .15s}

/*── Confidence bar ──*/
.conf-w{width:100%;height:3px;background:#EAEAEA;border-radius:2px;margin-top:5px}
.conf-f{height:3px;border-radius:2px;background:var(--aiva)}

/*── Priority strip ──*/
.priority-strip{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:32px}

/*── Wizard steps (deal flow) ──*/
.wiz{display:flex;padding:12px 16px 10px;gap:5px;align-items:center;background:#fff;border-bottom:1px solid var(--card-border);flex-shrink:0}
.wstep{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:background .2s}
.wline{flex:1;height:2px;background:#EAEAEA;border-radius:1px;transition:background .3s}
.wline.done{background:var(--brand)}

/*── Deal done ──*/
.deal-done{position:absolute;inset:0;background:#fff;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;animation:fade-up .35s ease-out}
.cbit{position:absolute;top:-20px;width:8px;height:8px;border-radius:2px;animation:confetti 1.4s ease-out forwards}
.confetti-w{position:absolute;top:0;left:0;right:0;height:300px;overflow:hidden;pointer-events:none}

/*── Scan overlay ──*/
.scan-overlay{position:absolute;inset:0;background:#000;z-index:80;display:flex;flex-direction:column;animation:fade-up .2s ease-out}
.scan-vf{position:relative;flex:1;background:#0D0F18;overflow:hidden}
.scan-reticle{position:absolute;left:24px;right:24px;top:50%;transform:translateY(-50%);border:2px solid #fff;border-radius:12px;overflow:hidden;aspect-ratio:1.586;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--brand),transparent);animation:scan-line 1.6s ease-in-out infinite}
.scorn{position:absolute;width:20px;height:20px}
.scorn.tl{top:-1px;left:-1px;border-top:3px solid var(--brand);border-left:3px solid var(--brand);border-radius:4px 0 0 0}
.scorn.tr{top:-1px;right:-1px;border-top:3px solid var(--brand);border-right:3px solid var(--brand);border-radius:0 4px 0 0}
.scorn.bl{bottom:-1px;left:-1px;border-bottom:3px solid var(--brand);border-left:3px solid var(--brand);border-radius:0 0 0 4px}
.scorn.br{bottom:-1px;right:-1px;border-bottom:3px solid var(--brand);border-right:3px solid var(--brand);border-radius:0 0 4px 0}

/*── Sign-in ──*/
.signin-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#0A1628 0%,#0D2045 55%,#0F2D5C 100%);z-index:50;padding:40px 32px}
.si-inp{width:100%;padding:13px 16px;border-radius:var(--r8);background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.15);color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px}
.si-inp::placeholder{color:rgba(255,255,255,.4)}
.si-inp:focus{border-color:rgba(123,97,255,.7)}
.si-btn{width:100%;padding:14px;border-radius:var(--r8);background:var(--brand);color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:inherit;margin-top:4px}

/*── Toast ──*/
#toast-el{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:#1C2434;color:#fff;border-radius:var(--r4);padding:10px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.35);white-space:nowrap;z-index:9999;animation:toast-in .25s ease-out;pointer-events:none;display:none}

/*── Utility ──*/
.ani-in{animation:fade-up .22s ease-out both}
.mi{line-height:1;display:inline-block;vertical-align:middle}
</style>

<div id="shell"><div id="phone"></div></div>
<div id="toast-el"></div>

function mi(n,sz,col,fill){

}
function av(name,sz,bg){
  sz=sz||36;
  var initials=(name||'').split(' ').map(function(w){return w[0]||'';}).filter(Boolean).slice(0,2).join('').toUpperCase()||'?';
  var cols=['#196FE1','#0E8345','#B8730F','#7B61FF','#C5311E','#1F8FB7','#9B5C00','#3F51B5'];

  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+(bg||cols[idx])+';color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:600;font-size:'+Math.round(sz*.38)+'px;letter-spacing:.3px;flex-shrink:0;min-width:'+sz+'px">'+initials+'</div>';
}
function chip(txt,tone){return '<span class="chip c-'+tone+'">'+txt+'</span>';}
function vthumb(sz){

        +'<button onclick="toast(\'Full transcript opened\')" class="btn b-sm" style="background:var(--aiva-soft);color:var(--aiva-ink);border-color:var(--aiva-border);border-radius:var(--rpill);">'+mi('auto_awesome',13,'var(--aiva-ink)',1)+' Transcript</button>'
        +'<button onclick="toast(\'Calling '+c.name+'…\')" class="btn b-sm" style="background:transparent;color:var(--ink-mid);border-color:var(--card-border);border-radius:var(--rpill);">'+mi('call_made',13,'var(--ok)')+' Call back</button>'
        +'</div></div>';
    } else {
      html+='<div style="display:flex;flex-direction:'+(isOut?'row-reverse':'row')+';gap:8px;">'
        +(isOut?'':av(c.name,28))
        +'<div style="max-width:78%;">'
        +'<div style="padding:10px 13px;border-radius:'+(isOut?'14px 14px 4px 14px':'14px 14px 14px 4px')+';background:'+(isOut?'var(--brand)':'#fff')+';color:'+(isOut?'#fff':'var(--ink)')+';font-size:13px;line-height:1.45;'+(isOut?'':' border:1px solid var(--card-border);')+'">'
        +(m.byAiva?'<div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;">'+mi('auto_awesome',9,'rgba(255,255,255,.7)',1)+' AIVA drafted &middot; you sent</div>':'')
        +m.text+'</div>'
        +'<div style="font-size:10px;color:var(--ink-faint);margin-top:3px;text-align:'+(isOut?'right':'left')+';">'+m.time+'</div>'
        +'</div></div>';
    }
  });

  html+='</div>';

  // Compose bar
  html+='<div style="position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--card-border);padding:10px 12px;display:flex;align-items:center;gap:8px;">'
    +'<button onclick="toast(\'Voice-to-text\')" style="width:36px;height:36px;border:1.5px solid var(--card-border);background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">'+mi('mic',18,'var(--brand)')+'</button>'
    +'<div style="flex:1;background:var(--bg-alt);border-radius:var(--rpill);padding:9px 14px;font-size:14px;color:var(--ink-soft);cursor:text;">Reply to '+c.name+'&hellip;</div>'
    +'<button onclick="toast(\'AIVA drafting reply…\')" style="width:36px;height:36px;border:none;background:var(--aiva-d);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">'+mi('auto_awesome',18,'#fff',1)+'</button>'
    +'<button onclick="toast(\'Sending message\')" style="width:36px;height:36px;border:none;background:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">'+mi('send',18,'#fff',1)+'</button>'
    +'</div>';

  return html;
}

/* ═══════════════════════════════════════
   MASTER RENDER
═══════════════════════════════════════ */
function re(){
  var screenFn={
    signin:screenSignin,myday:screenMyDay,leads:screenLeads,
    search:screenSearch,customer:screenCustomer,session:screenSession,
    quote:screenQuote,desk:screenDesk,credit:screenCredit,done:screenDone,
    inv:screenInv,comms:screenComms,
    scan:screenMyDay
  }[S.screen]||screenMyDay;

  document.getElementById('phone').innerHTML=
    '<div class="screen-wrap">'+screenFn()+scanOverlay()+'</div>'+bnav();
}

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
window.doSignIn=function(){S.screen='myday';S.tab='myday';re();};
window.toggleAiva=function(){S.aiva=S.aiva==='off'?'passive':'off';toast(S.aiva!=='off'?'AIVA on \u2014 say \u201cHey AIVA\u201d':'AIVA off');re();};
window.toggleMic=function(){S.aiva=S.aiva==='listening'?'passive':'listening';re();};
window.toggleShowroom=function(){S.showroom=!S.showroom;if(S.showroom){S.aiva='listening';toast('Customer in showroom \u00b7 AIVA listening');}else toast('Showroom mode ended');re();};
window.openCustomer=function(id){S.apt=APTS.filter(function(a){return a.id===id;})[0]||APTS[0];S.step=S.apt.step||0;S.prev=S.screen;S.screen='customer';S.ctab='overview';if(S.apt.inShowroom){S.showroom=true;S.aiva='listening';}re();};
window.setCTab=function(t){S.ctab=t;re();};
window.setSTab=function(t){S.stab=t;re();};
window.nav=function(sc){S.prev=S.screen;S.screen=sc;if(sc==='session'&&S.aiva==='off')S.aiva='listening';if(sc==='quote')S.dealStage=0;if(sc==='desk')S.dealStage=1;if(sc==='credit')S.dealStage=2;re();};
window.goBack=function(){
  if(S.screen==='comms'&&S.commsThread!=null){S.commsThread=null;re();return;}
  var map={session:'customer',quote:'session',desk:'quote',credit:'desk',customer:(S.tab==='cust'?'search':'myday'),inv:'myday',comms:'myday'};
  S.screen=map[S.screen]||'myday';re();
};
window.setTab=function(id){S.tab=id;if(id==='myday')S.screen='myday';else if(id==='leads')S.screen='leads';else if(id==='cust')S.screen='search';else if(id==='inv'){S.screen='inv';}else if(id==='comms'){S.commsThread=null;S.screen='comms';}re();};
window.openScan=function(){if(S.scanTimer)clearTimeout(S.scanTimer);S.scanStage='aim';S.prev=S.screen;S.screen='scan';re();S.scanTimer=setTimeout(function(){S.scanStage='lock';re();S.scanTimer=setTimeout(function(){S.scanStage='confirm';re();},1800);},900);};
window.closeScan=function(){if(S.scanTimer)clearTimeout(S.scanTimer);S.screen=S.prev||'myday';re();};
window.confirmScan=function(){closeScan();toast('License saved to '+S.apt.name);};
window.sendDesk=function(){S.deskSent=true;re();toast('Sent to Brandon \u2713');};
window.sendCreditLink=function(){toast('Secure credit link sent to Juan');setTimeout(function(){S.dealStage=2;re();},400);};
window.submitCredit=function(){S.dealStage=3;S.screen='done';re();};
window.backToMyDay=function(){S.screen='myday';S.tab='myday';S.deskSent=false;S.dealStage=0;S.showroom=false;APTS[0].inShowroom=false;re();};

document.addEventListener('DOMContentLoaded',function(){re();});
</script>
</html>
